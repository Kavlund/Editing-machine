<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · Acquisition Empire Editing Machine</title>
  <style>
    :root{
      --bg:#0e1016; --card:rgba(255,255,255,.045); --card-line:rgba(255,255,255,.10);
      --ink:#f3f4f8; --body:#c3c7d4; --muted:#8b90a2;
      --indigo:#7c74ff; --indigo-soft:rgba(124,116,255,.16);
      --red:#ff7a6b;
      --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
      --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;font-family:var(--sans);color:var(--body);background:var(--bg);
      background-image:radial-gradient(1100px 600px at 15% -5%,rgba(124,116,255,.20),transparent 60%),
                       radial-gradient(900px 500px at 100% 0%,rgba(67,209,127,.10),transparent 55%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    }
    .login-card{
      width:100%;max-width:400px;background:var(--card);border:1px solid var(--card-line);
      border-radius:20px;padding:38px 34px;backdrop-filter:blur(10px);
      box-shadow:0 30px 80px -30px rgba(0,0,0,.6);
      display:flex;flex-direction:column;gap:26px;
    }
    .login-brand{display:flex;flex-direction:column;align-items:center;text-align:center;gap:13px;}
    .login-brand img{width:56px;height:56px;object-fit:contain;}
    .login-eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--indigo);}
    .login-title{font-size:1.35rem;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.15;}
    .login-sub{font-size:.85rem;color:var(--muted);}
    .login-form{display:flex;flex-direction:column;gap:15px;}
    .field-label{font-size:.8rem;color:var(--body);margin-bottom:7px;display:block;font-weight:500;}
    .pw-wrap{position:relative;}
    #password{
      width:100%;background:rgba(255,255,255,.05);border:1px solid var(--card-line);
      border-radius:11px;padding:13px 46px 13px 15px;color:var(--ink);font-size:.95rem;font-family:var(--sans);
      transition:.2s;outline:none;
    }
    #password::placeholder{color:var(--muted);}
    #password:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-soft);background:rgba(255,255,255,.07);}
    .pw-toggle{
      position:absolute;right:6px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:var(--muted);
      padding:8px;border-radius:8px;display:flex;align-items:center;transition:.2s;
    }
    .pw-toggle:hover{color:var(--ink);background:rgba(255,255,255,.07);}
    .login-error{font-size:.8rem;color:var(--red);text-align:center;min-height:18px;}
    .btn-signin{
      width:100%;border:none;cursor:pointer;background:var(--indigo);color:#fff;
      font-size:.95rem;font-weight:600;font-family:var(--sans);padding:13px;border-radius:11px;
      transition:.2s;
    }
    .btn-signin:hover{background:#8b83ff;box-shadow:0 8px 24px -8px rgba(124,116,255,.7);}
    .btn-signin:disabled{opacity:.6;cursor:default;box-shadow:none;}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <img src="/logo.png" alt="Acquisition Empire">
      <div>
        <div class="login-eyebrow">Acquisition Empire</div>
        <div class="login-title">Editing Machine</div>
      </div>
      <span class="login-sub">Enter your password to continue</span>
    </div>

    <form class="login-form" id="login-form">
      <div>
        <label class="field-label" for="password">Password</label>
        <div class="pw-wrap">
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            autofocus
          >
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
            <svg id="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="login-error" id="error-msg"></div>
      <button type="submit" class="btn-signin" id="submit-btn">
        Sign in
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    // Show / hide password
    const pwInput = document.getElementById('password');
    const pwToggle = document.getElementById('pw-toggle');
    const eyeOpen = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');
    pwToggle.addEventListener('click', () => {
      const reveal = pwInput.type === 'password';
      pwInput.type = reveal ? 'text' : 'password';
      eyeOpen.style.display = reveal ? 'none' : '';
      eyeClosed.style.display = reveal ? '' : 'none';
      pwToggle.setAttribute('aria-label', reveal ? 'Hide password' : 'Show password');
      pwInput.focus();
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorMsg.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json().catch(() => ({}));
          errorMsg.textContent = data.detail || 'Invalid password';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign in';
        }
      } catch {
        errorMsg.textContent = 'Could not connect to server';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
